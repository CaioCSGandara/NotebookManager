<div class="cadastro-container">
  <h2>Cadastro de Novo Aluno</h2>
  <p>Preencha os dados abaixo para o RA: <strong>{{ ra }}</strong></p>

  <form (ngSubmit)="cadastrarAluno()">
    <div class="form-group">
        <label for="ra-display">RA:</label>
        <input type="text" id="ra-display" [value]="ra" class="form-control" readonly disabled>
    </div>

    <div class="form-group">
      <label for="nome">Nome Completo:</label>
      <input type="text" id="nome" name="nome" [(ngModel)]="nome" class="form-control" required>
    </div>

    <div class="form-group">
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" class="form-control" required placeholder="exemplo@puccampinas.edu.br">
    </div>

    <div class="form-group">
      <label for="telefone">Telefone:</label>
      <input
        type="tel"
        id="telefone"
        name="telefone"
        [(ngModel)]="telefone"
        class="form-control"
        required
        mask="(00)00000-0000"  
        placeholder="(19)99999-9999"
      />
    </div>

    <div class="form-group">
      <label for="curso">Curso:</label>
      <select id="curso" name="curso" [(ngModel)]="curso" class="form-control" required>
        <option value="" disabled selected>-- Selecione um Curso --</option>
        <option *ngFor="let cursoOpt of cursosDisponiveis" [value]="cursoOpt.value">
           {{ cursoOpt.display }} </option>
      </select>
    </div>
    <p *ngIf="mensagemStatus"
       [ngClass]="{'status-success': mensagemStatus.startsWith('Sucesso'), 'status-error': mensagemStatus.startsWith('Erro')}"
       class="status-message">
      {{ mensagemStatus }}
    </p>

    <div class="actions">
      <a routerLink="/" class="btn btn-light">Voltar para Home</a>
      <button type="submit" class="btn btn-primary" [disabled]="isLoading || !nome || !email || !curso">
        <span *ngIf="!isLoading">Cadastrar Usuário</span>
        <span *ngIf="isLoading">Cadastrando...</span>
      </button>
    </div>
  </form>
</div>

<div *ngIf="isSucessoModalVisible" class="modal-backdrop" (click)="fecharSucessoModal()"> <div class="modal-content modal-success" (click)="$event.stopPropagation()"> <div class="modal-icon-success">
        <i class="fas fa-check-circle"></i> </div>
    <h2>Cadastro Realizado!</h2>
    <p>O aluno com RA <strong>{{ ra }}</strong> foi cadastrado com sucesso.</p>
    <p>O que você gostaria de fazer agora?</p>
    <div class="modal-actions">
      <button (click)="irParaInicio()" type="button" class="btn btn-light">Voltar ao Início</button>
      <button (click)="irParaEmprestimo()" type="button" class="btn btn-primary">Iniciar Empréstimo</button>
    </div>
  </div>
</div>
